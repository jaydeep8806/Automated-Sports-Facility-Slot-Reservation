services:
  # 1. Backend Web Service
  - type: web
    name: sportslot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sportslot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: sportslot-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sportslot-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # 3. PostgreSQL Database
  - name: sportslot-db
    databaseName: sports_booking
    user: sports_admin
    plan: free
